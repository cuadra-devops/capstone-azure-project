name: Deploy Static Site

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_05DB6BD2BC7442159C779CD6BEEDAD7D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E2A99A91253743C79D4B8CD50D506D8E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_22BF326A10D34F4696A221A212D713B7 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: capstone-webapp-brian2026-v2
          package: .
