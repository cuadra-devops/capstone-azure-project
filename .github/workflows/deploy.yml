name: Deploy Static Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

     

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: capstone-webapp-brian2026-v2
          package: .
